<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>npu_live - Coralboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e0f13; color: #e9e9ee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .card {
      width: min(620px, 95vw);
      background: #15171d; border: 1px solid #262a33; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .frame { width: 100%; aspect-ratio: 4/3; background: #000; }
    .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .meters { display: flex; gap: 1px; background: #262a33; }
    .meter { flex: 1; background: #15171d; padding: 16px 18px; }
    .meter .v { font-size: 34px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .meter .u { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #7d8597; margin-top: 6px; }
    .accent { color: #4ea1f2; }
    .body { padding: 18px 20px 22px; }
    .tag { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #7d8597; margin-bottom: 12px; }
    .bars { display: grid; gap: 9px; }
    .bar { display: grid; grid-template-columns: 150px 1fr 44px; gap: 10px; align-items: center; }
    .bar .label { font-size: 14px; color: #c7ccd6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track { height: 12px; background: #21252e; border-radius: 6px; overflow: hidden; }
    .fill { height: 100%; background: linear-gradient(90deg, #4ea1f2, #6c63ff);
            border-radius: 6px; width: 0; transition: width .12s linear; }
    .pct { font-size: 13px; color: #8a91a0; text-align: right; font-variant-numeric: tabular-nums; }
    .foot { margin-top: 16px; font-size: 11px; letter-spacing: .12em;
            text-transform: uppercase; color: #5a6072; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame"><img id="photo" alt="live frame" /></div>
    <div class="meters">
      <div class="meter"><div class="v accent" id="inf">--</div><div class="u">NPU inference (ms)</div></div>
      <div class="meter"><div class="v" id="fps">--</div><div class="u">frames / sec</div></div>
      <div class="meter"><div class="v" id="frames">0</div><div class="u">frames seen</div></div>
    </div>
    <div class="body">
      <div class="tag">top-5 classification - live on the NPU</div>
      <div class="bars" id="bars"></div>
      <div class="foot"><span id="mode">-</span><span>Coralboard - SL2619 - Coral NPU</span></div>
    </div>
  </div>

  <script>
    const photo = document.getElementById('photo');
    const barsEl = document.getElementById('bars');
    const rows = new Map();   // label -> {row, fill, pct, labelEl}

    function row() {
      const r = document.createElement('div'); r.className = 'bar';
      const label = document.createElement('div'); label.className = 'label';
      const track = document.createElement('div'); track.className = 'track';
      const fill = document.createElement('div'); fill.className = 'fill';
      const pct = document.createElement('div'); pct.className = 'pct';
      track.appendChild(fill); r.append(label, track, pct);
      return { r, label, fill, pct };
    }

    function render(d) {
      if (!d || d.type !== 'npu') return;
      document.getElementById('inf').textContent = (d.inf_ms ?? 0).toFixed(1);
      document.getElementById('fps').textContent = (d.fps ?? 0).toFixed(1);
      document.getElementById('frames').textContent = d.frames ?? 0;
      document.getElementById('mode').textContent = d.mode || '';
      if (d.photo) photo.src = d.photo + '?t=' + Date.now();

      const items = (d.items || []).slice(0, 5);
      // Rebuild rows in rank order each frame (labels change as the scene changes).
      barsEl.innerHTML = '';
      items.forEach(it => {
        const cell = row();
        cell.label.textContent = it.label;
        cell.fill.style.width = Math.max(0, Math.min(100, it.confidence * 100)).toFixed(1) + '%';
        cell.pct.textContent = (it.confidence * 100).toFixed(0) + '%';
        barsEl.appendChild(cell.r);
      });
    }

    const es = new EventSource('/events');
    es.onmessage = e => { try { render(JSON.parse(e.data)); } catch (_) {} };
  </script>
</body>
</html>

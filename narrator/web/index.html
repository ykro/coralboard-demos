<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>narrator - Coralboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e0f13; color: #e9e9ee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .card {
      width: min(560px, 94vw);
      background: #15171d; border: 1px solid #262a33; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .frame { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; }
    .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .frame svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .box { fill: none; stroke: #6c63ff; stroke-width: 2; }
    .labels { position: absolute; inset: 0; pointer-events: none; }
    .lbl { position: absolute; transform: translateY(-100%);
      background: #6c63ff; color: #0b0820; font-size: 11px; font-weight: 700;
      line-height: 1.3; padding: 1px 5px; border-radius: 4px 4px 4px 0; white-space: nowrap; }
    .body { padding: 20px 22px 22px; }
    .tag { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #7d8597; }
    .caption { font-size: 21px; line-height: 1.45; margin: 8px 0 6px; min-height: 2.6em; }
    .caption.thinking { color: #8a91a0; font-style: italic; }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .pill { font-size: 12px; color: #c7ccd6; background: #21252e; border: 1px solid #323845;
            border-radius: 999px; padding: 3px 10px; }
    .stats { display: flex; gap: 20px; margin-top: 16px; padding-top: 14px; border-top: 1px solid #262a33; }
    .stat .n { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat .l { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #7d8597; }
    .foot { margin-top: 14px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
            color: #5a6072; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <img id="photo" alt="camera frame" />
      <svg id="boxes" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="labels" id="labelsOv"></div>
    </div>
    <div class="body">
      <div class="tag">gemma 3 270m says (on-device)</div>
      <div class="caption" id="caption">Looking around...</div>
      <div class="pills" id="pills"></div>
      <div class="stats">
        <div class="stat"><div class="n" id="fps">-</div><div class="l">vision fps (NPU)</div></div>
        <div class="stat"><div class="n" id="genms">-</div><div class="l">caption gen (ms, CPU)</div></div>
      </div>
      <div class="foot"><span id="mode">-</span><span>Coralboard - NPU vision + Gemma CPU</span></div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    // Swap the frame only once the new JPEG has decoded (no white flash), and
    // skip a refresh if one is still loading so fast updates don't pile up.
    let imgBusy = false;
    function setPhoto(url) {
      if (imgBusy) return;
      imgBusy = true;
      const n = new Image();
      n.onload = () => { $('photo').src = n.src; imgBusy = false; };
      n.onerror = () => { imgBusy = false; };
      n.src = url + '?t=' + Date.now();
    }
    function render(d) {
      if (!d || d.type !== 'narrator') return;
      if (d.photo) setPhoto(d.photo);
      const cap = $('caption');
      cap.textContent = d.caption || '';
      cap.classList.toggle('thinking', !!d.thinking);
      $('fps').textContent = d.fps != null ? d.fps.toFixed(1) : '-';
      $('genms').textContent = d.gen_ms != null ? d.gen_ms : '-';
      $('mode').textContent = d.mode || '';

      const boxes = $('boxes'); boxes.innerHTML = '';
      const labels = $('labelsOv'); labels.innerHTML = '';
      (d.boxes || []).forEach(b => {
        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        r.setAttribute('class', 'box');
        r.setAttribute('x', (b.x*100).toFixed(2)); r.setAttribute('y', (b.y*100).toFixed(2));
        r.setAttribute('width', (b.w*100).toFixed(2)); r.setAttribute('height', (b.h*100).toFixed(2));
        boxes.appendChild(r);
        const lbl = document.createElement('div'); lbl.className = 'lbl';
        lbl.style.left = (b.x*100).toFixed(2) + '%';
        lbl.style.top = Math.max(b.y*100, 4).toFixed(2) + '%';
        lbl.textContent = `${b.label} ${(b.conf*100).toFixed(0)}%`;
        labels.appendChild(lbl);
      });
      const pills = $('pills'); pills.innerHTML = '';
      [...new Set(d.labels || [])].forEach(l => {
        const p = document.createElement('span'); p.className = 'pill'; p.textContent = l;
        pills.appendChild(p);
      });
    }
    const es = new EventSource('/events');
    es.onmessage = e => { try { render(JSON.parse(e.data)); } catch (_) {} };
  </script>
</body>
</html>

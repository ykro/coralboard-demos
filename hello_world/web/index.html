<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>hello_world - Coralboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e0f13; color: #e9e9ee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .card {
      width: min(560px, 94vw);
      background: #15171d; border: 1px solid #262a33; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .frame { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; }
    .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .frame svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .box { fill: none; stroke: #3ddc84; stroke-width: 2; }
    .frame .labels { position: absolute; inset: 0; pointer-events: none; }
    .lbl {
      position: absolute; transform: translateY(-100%);
      background: #3ddc84; color: #06140c; font-size: 11px; font-weight: 700;
      line-height: 1.3; padding: 1px 5px; border-radius: 4px 4px 4px 0;
      white-space: nowrap; max-width: 92%; overflow: hidden; text-overflow: ellipsis;
    }
    .body { padding: 20px 22px 22px; }
    .tag { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #7d8597; }
    .greeting { font-size: 20px; line-height: 1.45; margin: 8px 0 18px; min-height: 2.5em; }
    .steps { list-style: none; display: grid; gap: 6px; }
    .steps li { display: flex; gap: 10px; align-items: baseline; font-size: 14px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; transform: translateY(1px); }
    .ok { background: #3ddc84; } .bad { background: #f24e4e; }
    .name { color: #c7ccd6; min-width: 220px; }
    .detail { color: #8a91a0; }
    .foot { margin-top: 16px; font-size: 11px; letter-spacing: .12em;
            text-transform: uppercase; color: #5a6072; display: flex; justify-content: space-between; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
                margin-top: 18px; padding-top: 16px; border-top: 1px solid #262a33; }
    .ctl-label { font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
                 color: #7d8597; margin-right: 2px; }
    .btn { font: inherit; font-size: 13px; color: #e9e9ee; background: #21252e;
           border: 1px solid #323845; border-radius: 8px; padding: 7px 12px; cursor: pointer; }
    .btn .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
                   background: var(--c); margin-right: 6px; transform: translateY(1px); }
    .btn:hover { background: #2a2f3a; } .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: default; }
    .chat { margin-top: 18px; padding-top: 16px; border-top: 1px solid #262a33; }
    .chat-log { display: flex; flex-direction: column; gap: 8px; max-height: 220px;
                overflow-y: auto; margin-bottom: 10px; }
    .msg { font-size: 14px; line-height: 1.4; padding: 8px 11px; border-radius: 10px; max-width: 85%; }
    .msg.me { align-self: flex-end; background: #2b3550; color: #eef1f7; }
    .msg.bot { align-self: flex-start; background: #1b2029; color: #d7dce6; border: 1px solid #2a3140; }
    .msg.bot.pending { color: #8a91a0; font-style: italic; }
    .chat-form { display: flex; gap: 8px; }
    .chat-input { flex: 1; font: inherit; font-size: 14px; color: #e9e9ee; background: #0f1116;
                  border: 1px solid #323845; border-radius: 8px; padding: 9px 11px; }
    .chat-input:focus { outline: none; border-color: #4a5670; }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <img id="photo" alt="camera frame" />
      <svg id="boxes" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div class="labels" id="labels"></div>
    </div>
    <div class="body">
      <div class="tag">the board says</div>
      <div class="greeting" id="greeting">waiting for the board...</div>
      <div class="tag" style="margin-bottom:8px">self-test</div>
      <ul class="steps" id="steps"></ul>
      <div class="controls">
        <span class="ctl-label">LED</span>
        <button class="btn" style="--c:#ff0000" onclick="led('ff0000')"><span class="swatch"></span>Red</button>
        <button class="btn" style="--c:#00ff00" onclick="led('00ff00')"><span class="swatch"></span>Green</button>
        <button class="btn" style="--c:#0000ff" onclick="led('0000ff')"><span class="swatch"></span>Blue</button>
        <button class="btn" style="--c:#ffffff" onclick="led('ffffff')"><span class="swatch"></span>All</button>
        <button class="btn" onclick="led('000000')">Off</button>
        <button class="btn" id="buzzBtn" onclick="buzz()">Buzz</button>
      </div>
      <div class="chat">
        <span class="ctl-label">Chat with Gemma 3 270M (on-device)</span>
        <div class="chat-log" id="chatLog" style="margin-top:10px"></div>
        <form class="chat-form" id="chatForm">
          <input class="chat-input" id="chatInput" autocomplete="off"
                 placeholder="Ask the board something..." />
          <button class="btn" id="chatSend" type="submit">Send</button>
        </form>
      </div>
      <div class="foot"><span id="mode">-</span><span>Coralboard - SL2619 - Coral NPU</span></div>
    </div>
  </div>

  <script>
    const photo = document.getElementById('photo');
    const boxes = document.getElementById('boxes');
    const labels = document.getElementById('labels');
    const stepsEl = document.getElementById('steps');

    function render(d) {
      if (!d || d.type !== 'hello') return;
      document.getElementById('greeting').textContent = d.greeting || '';
      document.getElementById('mode').textContent = d.mode || '';
      if (d.photo) photo.src = d.photo + '?t=' + Date.now();

      boxes.innerHTML = '';
      labels.innerHTML = '';
      (d.boxes || []).forEach(b => {
        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        r.setAttribute('class', 'box');
        r.setAttribute('x', (b.x * 100).toFixed(2));
        r.setAttribute('y', (b.y * 100).toFixed(2));
        r.setAttribute('width', (b.w * 100).toFixed(2));
        r.setAttribute('height', (b.h * 100).toFixed(2));
        boxes.appendChild(r);
        // Label as an HTML overlay (the SVG is stretched, which would distort text).
        const lbl = document.createElement('div');
        lbl.className = 'lbl';
        lbl.style.left = (b.x * 100).toFixed(2) + '%';
        lbl.style.top = Math.max(b.y * 100, 4).toFixed(2) + '%';
        lbl.textContent = `${b.label} ${(b.conf * 100).toFixed(0)}%`;
        labels.appendChild(lbl);
      });

      stepsEl.innerHTML = '';
      (d.steps || []).forEach(s => {
        const li = document.createElement('li');
        li.innerHTML =
          `<span class="dot ${s.ok ? 'ok' : 'bad'}"></span>` +
          `<span class="name">${s.name}</span>` +
          `<span class="detail">${s.detail || ''}</span>`;
        stepsEl.appendChild(li);
      });
    }

    function led(color) { fetch('/action?do=led&color=' + color); }

    // Buzz is a toggle: press once to sound, press again to stop. The server
    // reports the new state; reflect it on the button so you can see it's on.
    const buzzBtn = document.getElementById('buzzBtn');
    async function buzz() {
      try {
        const r = await fetch('/action?do=buzz');
        const d = await r.json();
        const on = !!d.buzzing;
        buzzBtn.textContent = on ? 'Buzz (on)' : 'Buzz';
        buzzBtn.style.background = on ? '#7a2230' : '';
        buzzBtn.style.borderColor = on ? '#b8324a' : '';
      } catch (_) {}
    }

    // --- Gemma chat ---------------------------------------------------------
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');

    function addMsg(text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls;
      el.textContent = text;
      chatLog.appendChild(el);
      chatLog.scrollTop = chatLog.scrollHeight;
      return el;
    }

    document.getElementById('chatForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;
      addMsg(text, 'me');
      chatInput.value = '';
      chatInput.disabled = chatSend.disabled = true;
      const pending = addMsg('thinking...', 'bot pending');
      try {
        const r = await fetch('/action?do=chat&msg=' + encodeURIComponent(text));
        const d = await r.json();
        pending.classList.remove('pending');
        pending.textContent = d.reply || d.error || '(no answer)';
      } catch (_) {
        pending.classList.remove('pending');
        pending.textContent = '(connection error)';
      } finally {
        chatInput.disabled = chatSend.disabled = false;
        chatInput.focus();
      }
    });

    const es = new EventSource('/events');
    es.onmessage = e => { try { render(JSON.parse(e.data)); } catch (_) {} };
  </script>
</body>
</html>

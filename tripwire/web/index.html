<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>tripwire - Coralboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e0f13; color: #e9e9ee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .card {
      width: min(560px, 94vw);
      background: #15171d; border: 1px solid #262a33; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .frame { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; touch-action: none; }
    .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .frame svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .box { fill: none; stroke: #3ddc84; stroke-width: 2; }
    .lbl { position: absolute; transform: translateY(-100%);
      background: #3ddc84; color: #06140c; font-size: 11px; font-weight: 700;
      line-height: 1.3; padding: 1px 5px; border-radius: 4px 4px 4px 0; white-space: nowrap; }
    .labels { position: absolute; inset: 0; pointer-events: none; }
    .line { stroke: #ffcf4d; stroke-width: 1.2; stroke-dasharray: 3 2; }
    .handle { fill: #ffcf4d; stroke: #1a1407; stroke-width: 0.4; cursor: grab; }
    .trk { fill: #ff5fa2; }
    .body { padding: 18px 20px 20px; }
    .tag { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #7d8597; }
    .count { font-size: 56px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums;
             margin: 6px 0 2px; }
    .dirs { display: flex; gap: 22px; color: #9aa1b0; font-size: 13px; }
    .dirs b { color: #fff; font-variant-numeric: tabular-nums; }
    .stats { display: flex; gap: 18px; margin-top: 14px; align-items: flex-end; }
    .stat .n { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat .l { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #7d8597; }
    .btn { font: inherit; font-size: 13px; color: #e9e9ee; background: #21252e; margin-left: auto;
           border: 1px solid #323845; border-radius: 8px; padding: 7px 12px; cursor: pointer; }
    .btn:hover { background: #2a2f3a; }
    .hint { font-size: 12px; color: #6e7686; margin-top: 6px; }
    .foot { margin-top: 14px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
            color: #5a6072; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame" id="frame">
      <img id="photo" alt="camera frame" />
      <div class="labels" id="labels"></div>
      <svg id="ov" viewBox="0 0 100 100" preserveAspectRatio="none">
        <g id="boxes"></g>
        <g id="tracks"></g>
        <line id="ln" class="line" x1="50" y1="5" x2="50" y2="95"></line>
        <circle id="h1" class="handle" cx="50" cy="5" r="2.6"></circle>
        <circle id="h2" class="handle" cx="50" cy="95" r="2.6"></circle>
      </svg>
    </div>
    <div class="body">
      <div class="tag">crossings</div>
      <div class="count" id="count">0</div>
      <div class="dirs">
        <span>&rarr; one way <b id="ab">0</b></span>
        <span>&larr; other way <b id="ba">0</b></span>
      </div>
      <div class="hint" id="last"></div>
      <div class="stats">
        <div class="stat"><div class="n" id="fps">-</div><div class="l">det / s</div></div>
        <div class="stat"><div class="n" id="nobj">-</div><div class="l">objects now</div></div>
        <button class="btn" onclick="reset()">Reset</button>
      </div>
      <div class="hint">Drag the yellow endpoints to move the tripwire line.</div>
      <div class="foot"><span id="mode">-</span><span>Coralboard - SL2619 - Coral NPU</span></div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const ov = $('ov'), frame = $('frame');
    let line = { x1: 0.5, y1: 0.05, x2: 0.5, y2: 0.95 };
    let dragging = null;

    function render(d) {
      if (!d || d.type !== 'tripwire') return;
      if (d.photo) $('photo').src = d.photo + '?t=' + Date.now();
      $('count').textContent = d.count;
      $('ab').textContent = d.count_ab; $('ba').textContent = d.count_ba;
      $('fps').textContent = d.fps != null ? d.fps.toFixed(1) : '-';
      $('nobj').textContent = d.n_objects != null ? d.n_objects : '-';
      $('mode').textContent = d.mode || '';
      if (d.last_event) $('last').textContent =
        `last: ${d.last_event.label} crossed (${d.last_event.dir === 'ab' ? '→' : '←'})`;

      const boxes = $('boxes'); boxes.innerHTML = '';
      const labels = $('labels'); labels.innerHTML = '';
      (d.boxes || []).forEach(b => {
        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        r.setAttribute('class', 'box');
        r.setAttribute('x', (b.x*100).toFixed(2)); r.setAttribute('y', (b.y*100).toFixed(2));
        r.setAttribute('width', (b.w*100).toFixed(2)); r.setAttribute('height', (b.h*100).toFixed(2));
        boxes.appendChild(r);
        const lbl = document.createElement('div'); lbl.className = 'lbl';
        lbl.style.left = (b.x*100).toFixed(2) + '%';
        lbl.style.top = Math.max(b.y*100, 4).toFixed(2) + '%';
        lbl.textContent = `${b.label} ${(b.conf*100).toFixed(0)}%`;
        labels.appendChild(lbl);
      });
      const tg = $('tracks'); tg.innerHTML = '';
      (d.tracks || []).forEach(t => {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('class', 'trk');
        c.setAttribute('cx', (t.cx*100).toFixed(2)); c.setAttribute('cy', (t.cy*100).toFixed(2));
        c.setAttribute('r', '1.6'); tg.appendChild(c);
      });
      // Only sync the line from the server when we're not actively dragging it.
      if (!dragging && d.line) {
        line = { x1: d.line[0][0], y1: d.line[0][1], x2: d.line[1][0], y2: d.line[1][1] };
        drawLine();
      }
    }

    function drawLine() {
      $('ln').setAttribute('x1', (line.x1*100).toFixed(2)); $('ln').setAttribute('y1', (line.y1*100).toFixed(2));
      $('ln').setAttribute('x2', (line.x2*100).toFixed(2)); $('ln').setAttribute('y2', (line.y2*100).toFixed(2));
      $('h1').setAttribute('cx', (line.x1*100).toFixed(2)); $('h1').setAttribute('cy', (line.y1*100).toFixed(2));
      $('h2').setAttribute('cx', (line.x2*100).toFixed(2)); $('h2').setAttribute('cy', (line.y2*100).toFixed(2));
    }
    function norm(ev) {
      const r = frame.getBoundingClientRect();
      const t = ev.touches ? ev.touches[0] : ev;
      return { x: Math.min(1, Math.max(0, (t.clientX - r.left)/r.width)),
               y: Math.min(1, Math.max(0, (t.clientY - r.top)/r.height)) };
    }
    function startDrag(which) { return (ev) => { ev.preventDefault(); dragging = which; }; }
    function moveDrag(ev) {
      if (!dragging) return;
      const p = norm(ev);
      if (dragging === 'h1') { line.x1 = p.x; line.y1 = p.y; } else { line.x2 = p.x; line.y2 = p.y; }
      drawLine();
    }
    function endDrag() {
      if (!dragging) return;
      dragging = null;
      fetch(`/action?do=line&x1=${line.x1.toFixed(4)}&y1=${line.y1.toFixed(4)}` +
            `&x2=${line.x2.toFixed(4)}&y2=${line.y2.toFixed(4)}`);
    }
    $('h1').addEventListener('mousedown', startDrag('h1'));
    $('h2').addEventListener('mousedown', startDrag('h2'));
    $('h1').addEventListener('touchstart', startDrag('h1'), { passive: false });
    $('h2').addEventListener('touchstart', startDrag('h2'), { passive: false });
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function reset() { fetch('/action?do=reset'); }
    drawLine();
    const es = new EventSource('/events');
    es.onmessage = e => { try { render(JSON.parse(e.data)); } catch (_) {} };
  </script>
</body>
</html>
